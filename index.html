<!DOCTYPE html>
<html lang="en">
  <head>
    <title>marselena sequoia</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="software engineer based in lenapehoking, building open-source tools for local community"
    />
    <link rel="icon" href="/public/favicon.ico" />
    <link rel="stylesheet" href="/tailwind.css" />
  </head>
  <body>
    <div id="app">
      <main
        class="flex h-dvh items-center justify-center bg-light font-satoshi text-dark dark:bg-dark dark:text-light"
      >
        <div>
          <div class="relative bottom-5">
            <h1
              class="text-5xl font-bold leading-10"
              aria-label="Marselena Sequoia"
            >
              <!-- shift "marselena" slightly left so the letters in "sequoia" line up perfectly -->
              <span class="relative right-[2.75px]">marselena</span>
              <br />
              sequoia
            </h1>
            <h2 class="mt-4 text-xl" aria-label="software engineer">
              software engineer
            </h2>
          </div>
          <ul class="mt-3">
            <li>
              <a
                class="mb-1 flex w-fit items-center"
                href="https://github.com/marsbird"
              >
                <img
                  class="mr-1 size-3 dark:hidden"
                  src="/public/logos/github.svg"
                  alt="github"
                />
                <img
                  class="mr-1 hidden size-3 dark:inline"
                  src="/public/logos/github-dark.svg"
                  alt="github"
                />
                <p class="text-xs font-light">marsbird</p>
              </a>
            </li>
            <li>
              <div class="mb-1 flex w-fit items-center">
                <img
                  class="mr-1 size-3 dark:hidden"
                  src="/public/logos/mail.svg"
                  alt="email"
                />
                <img
                  class="mr-1 hidden size-3 dark:inline"
                  src="/public/logos/mail-dark.svg"
                  alt="email"
                />
                <!-- https://spencermortensen.com/articles/email-obfuscation/#text-display -->
                <p class="text-xs font-light">
                  <b class="hidden">contact</b>
                  marselena
                  <b class="hidden">me</b>
                  @
                  <b class="hidden">here</b>
                  proton.me
                </p>
              </div>
            </li>
            <li>
              <a
                class="mb-1 flex w-fit items-center"
                href="https://en.wikipedia.org/wiki/Lenapehoking"
              >
                <img
                  class="mr-1 size-3 dark:hidden"
                  src="/public/logos/maptag.svg"
                  alt="location"
                />
                <img
                  class="mr-1 hidden size-3 dark:inline"
                  src="/public/logos/maptag-dark.svg"
                  alt="location"
                />
                <p class="text-xs font-light">lenapehoking</p>
              </a>
            </li>
          </ul>
        </div>
      </main>
    </div>
  </body>
</html>

<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="software engineer based in lenapehoking, building open-source tools for local community"
    />
    <title>marselena sequoia</title>
    <link rel="stylesheet" href="/tailwind.css" />
    <link rel="icon" href="/static/favicon.ico" />
  </head>
  <body>
    <main
      class="flex h-dvh items-center justify-center bg-[url('/static/images/leaves.webp')] bg-cover font-satoshi text-light"
    >
      <div>
        <div class="mb-8">
          <h1
            class="text-5xl font-bold leading-10"
            aria-label="Marselena Sequoia"
          >
            <!-- shift "marselena" slightly left so the letters in "sequoia" line up perfectly -->
            <span class="inline-block transform translate-x-[-2.75px]">
              marselena
            </span>
            <br />
            sequoia
          </h1>
          <h2 class="mt-4 text-xl" aria-label="software engineer">
            software engineer<span class="select-none"></span>
          </h2>
        </div>
        <ul>
          <li>
            <a
              class="mb-1 flex w-fit items-center"
              href="https://github.com/marsbird"
            >
              <img
                class="mr-1 size-3"
                src="/static/logos/github.svg"
                alt="github"
              />
              <p class="text-xs font-light">marsbird</p>
            </a>
          </li>
          <li>
            <div class="mb-1 flex w-fit items-center">
              <img
                class="mr-1 size-3"
                src="/static/logos/mail.svg"
                alt="email"
              />
              <!-- https://spencermortensen.com/articles/email-obfuscation/#text-display -->
              <p class="text-xs font-light">
                <b class="hidden">contact</b>marselena<b class="hidden"
                >me</b>@<b class="hidden">here</b>proton.me<b class="hidden"
                >please</b>
              </p>
            </div>
          </li>
          <li>
            <a
              class="mb-1 flex w-fit items-center"
              href="https://en.wikipedia.org/wiki/Lenapehoking"
            >
              <img
                class="mr-1 size-3"
                src="/static/logos/maptag.svg"
                alt="location"
              />
              <p class="text-xs font-light">lenapehoking</p>
            </a>
          </li>
        </ul>
      </div>
    </main>
  </body>
</html>
